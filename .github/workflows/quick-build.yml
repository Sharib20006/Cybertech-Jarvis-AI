name: Quick Build APK

on:
  workflow_dispatch:
    description: 'Build APK from current source code (no config changes)'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: quick-build-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: quick-${{ github.run_number }}
          name: Quick Build #${{ github.run_number }}
          files: app/build/outputs/apk/debug/*.apk
          body: |
            ## ⚡ Quick Build
            
            Built directly from source code without any modifications.
            
            - **Branch:** ${{ github.ref_name }}
            - **Commit:** ${{ github.sha }}
            - **Build Type:** Debug
            
            > This APK contains exactly what's in the repository.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
